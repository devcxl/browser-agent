name: Release

on:
  push:
    tags: ['v*']

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - run: npm ci

      - name: Run tests
        run: npm run test:run

      - name: Type check
        run: npm run typecheck

      - name: Set version from tag
        run: |
          VERSION="${GITHUB_REF#refs/tags/v}"
          echo "VERSION=$VERSION" >> "$GITHUB_ENV"
          npm pkg set version="$VERSION"

      - name: Build & package Chrome
        run: npx wxt zip -b chrome

      - name: Build & package Firefox
        run: npx wxt zip -b firefox --mv3

      - name: Build & package sources
        run: npx wxt zip

      - name: Verify manifests
        run: bash scripts/verify-manifest.sh

      - name: Check size
        run: bash scripts/check-size.sh

      - name: Check store secrets
        id: store-secrets
        env:
          CHROME_EXTENSION_ID: ${{ secrets.CHROME_EXTENSION_ID }}
          CHROME_CLIENT_ID: ${{ secrets.CHROME_CLIENT_ID }}
          CHROME_CLIENT_SECRET: ${{ secrets.CHROME_CLIENT_SECRET }}
          CHROME_REFRESH_TOKEN: ${{ secrets.CHROME_REFRESH_TOKEN }}
          AMO_JWT_ISSUER: ${{ secrets.AMO_JWT_ISSUER }}
          AMO_JWT_SECRET: ${{ secrets.AMO_JWT_SECRET }}
        run: |
          echo "chrome=$([ -n "$CHROME_EXTENSION_ID" ] && [ -n "$CHROME_CLIENT_ID" ] && [ -n "$CHROME_CLIENT_SECRET" ] && [ -n "$CHROME_REFRESH_TOKEN" ] && echo 'true' || echo 'false')" >> "$GITHUB_OUTPUT"
          echo "firefox=$([ -n "$AMO_JWT_ISSUER" ] && [ -n "$AMO_JWT_SECRET" ] && echo 'true' || echo 'false')" >> "$GITHUB_OUTPUT"

      - name: Prepare source archive for Firefox
        if: steps.store-secrets.outputs.firefox == 'true'
        run: |
          mkdir -p web-ext-source
          zip -r web-ext-source/source.zip . \
            -x ".git/*" \
            -x "node_modules/*" \
            -x "dist/*" \
            -x "*.zip" \
            -x "web-ext-source/*"

      - name: Submit to stores
        if: steps.store-secrets.outputs.chrome == 'true' || steps.store-secrets.outputs.firefox == 'true'
        env:
          CHROME_EXTENSION_ID: ${{ secrets.CHROME_EXTENSION_ID }}
          CHROME_CLIENT_ID: ${{ secrets.CHROME_CLIENT_ID }}
          CHROME_CLIENT_SECRET: ${{ secrets.CHROME_CLIENT_SECRET }}
          CHROME_REFRESH_TOKEN: ${{ secrets.CHROME_REFRESH_TOKEN }}
          FIREFOX_JWT_ISSUER: ${{ secrets.AMO_JWT_ISSUER }}
          FIREFOX_JWT_SECRET: ${{ secrets.AMO_JWT_SECRET }}
        run: |
          ARGS=""
          if [ "${{ steps.store-secrets.outputs.chrome }}" = "true" ]; then
            ARGS="$ARGS --chrome-zip dist/*-chrome.zip --chrome-skip-submit-review"
          fi
          if [ "${{ steps.store-secrets.outputs.firefox }}" = "true" ]; then
            ARGS="$ARGS --firefox-zip dist/*-firefox.zip --firefox-sources-zip web-ext-source/source.zip --firefox-channel listed"
          fi
          npx wxt submit $ARGS

      - name: Generate release notes
        id: notes
        run: |
          PREV_TAG=$(git tag --sort=-v:refname | head -2 | tail -1 || echo "")
          if [ -n "$PREV_TAG" ]; then
            NOTES=$(git log "$PREV_TAG"..HEAD --oneline --no-decorate 2>/dev/null || echo "")
            COMPARE_URL="https://github.com/${{ github.repository }}/compare/$PREV_TAG...${{ github.ref_name }}"
          else
            NOTES=$(git log --oneline --no-decorate 2>/dev/null || echo "")
            COMPARE_URL="https://github.com/${{ github.repository }}/commits/${{ github.ref_name }}"
          fi
          {
            echo 'notes<<EOF'
            echo "$NOTES"
            echo
            echo "变更详情: $COMPARE_URL"
            echo 'EOF'
          } >> "$GITHUB_OUTPUT"

      - name: Create draft release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: ${{ github.ref_name }}
          body: ${{ steps.notes.outputs.notes }}
          draft: true
          prerelease: false
          files: |
            dist/*.zip
