name: Build Draft Release

on:
  push:
    tags: ['v*']
  workflow_dispatch:
    inputs:
      tag:
        description: Existing tag to rebuild as a draft release
        required: true
        type: string

permissions:
  contents: write

concurrency:
  group: draft-release-${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref_name }}
  cancel-in-progress: false

jobs:
  build-draft:
    runs-on: ubuntu-latest
    env:
      RELEASE_TAG: ${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref_name }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref_name }}

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - run: npm ci

      - name: Run tests
        run: npm run test:run

      - name: Type check
        run: npm run typecheck

      - name: Set version from tag
        run: |
          if [[ ! "$RELEASE_TAG" =~ ^v[0-9]+\.[0-9]+\.[0-9]+(-[0-9A-Za-z.-]+)?$ ]]; then
            echo "::error::Invalid release tag: $RELEASE_TAG"
            exit 1
          fi
          VERSION="${RELEASE_TAG#v}"
          echo "VERSION=$VERSION" >> "$GITHUB_ENV"
          if [[ "$RELEASE_TAG" == *-* ]]; then
            echo "IS_PRERELEASE=true" >> "$GITHUB_ENV"
          else
            echo "IS_PRERELEASE=false" >> "$GITHUB_ENV"
          fi
          npm pkg set version="$VERSION"

      - name: Build & package Chrome
        run: npx wxt zip -b chrome

      - name: Build & package Firefox
        run: npx wxt zip -b firefox --mv3

      - name: Verify release assets
        run: |
          shopt -s nullglob
          CHROME_ZIPS=(dist/*-chrome.zip)
          FIREFOX_ZIPS=(dist/*-firefox.zip)
          SOURCE_ZIPS=(dist/*-sources.zip)
          if [ "${#CHROME_ZIPS[@]}" -ne 1 ] || [ "${#FIREFOX_ZIPS[@]}" -ne 1 ] || [ "${#SOURCE_ZIPS[@]}" -ne 1 ]; then
            echo "::error::Expected exactly one Chrome ZIP, one Firefox ZIP, and one source ZIP"
            exit 1
          fi

      - name: Verify manifests
        run: bash scripts/verify-manifest.sh

      - name: Check size
        run: bash scripts/check-size.sh

      - name: Generate release notes
        id: notes
        run: |
          PREV_TAG=$(git describe --tags --abbrev=0 "${RELEASE_TAG}^" 2>/dev/null || true)
          if [ -n "$PREV_TAG" ]; then
            NOTES=$(git log "$PREV_TAG".."$RELEASE_TAG" --oneline --no-decorate)
            COMPARE_URL="https://github.com/${{ github.repository }}/compare/$PREV_TAG...$RELEASE_TAG"
          else
            NOTES=$(git log "$RELEASE_TAG" --oneline --no-decorate)
            COMPARE_URL="https://github.com/${{ github.repository }}/commits/$RELEASE_TAG"
          fi
          {
            echo 'notes<<RELEASE_NOTES_END'
            echo "$NOTES"
            echo
            echo "变更详情: $COMPARE_URL"
            echo 'RELEASE_NOTES_END'
          } >> "$GITHUB_OUTPUT"

      - name: Create draft release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.RELEASE_TAG }}
          name: ${{ env.RELEASE_TAG }}
          body: ${{ steps.notes.outputs.notes }}
          draft: true
          prerelease: ${{ env.IS_PRERELEASE }}
          fail_on_unmatched_files: true
          overwrite_files: true
          files: |
            dist/*-chrome.zip
            dist/*-firefox.zip
            dist/*-sources.zip
