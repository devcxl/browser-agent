name: Release

on:
  push:
    tags: ['v*']

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - run: npm ci

      - name: Run tests
        run: npm run test:run

      - name: Type check
        run: npm run typecheck

      - name: Set version from tag
        run: |
          VERSION="${GITHUB_REF#refs/tags/v}"
          echo "VERSION=$VERSION" >> "$GITHUB_ENV"
          npm pkg set version="$VERSION"

      - name: Build & package Chrome
        run: npx wxt zip -b chrome

      - name: Build & package Firefox
        run: npx wxt zip -b firefox --mv3

      - name: Build & package sources
        run: npx wxt zip

      - name: Verify manifests
        run: bash scripts/verify-manifest.sh

      - name: Check size
        run: bash scripts/check-size.sh

      - name: Check AMO secrets
        id: amo-secrets
        env:
          AMO_JWT_ISSUER: ${{ secrets.AMO_JWT_ISSUER }}
          AMO_JWT_SECRET: ${{ secrets.AMO_JWT_SECRET }}
        run: |
          if [ -n "$AMO_JWT_ISSUER" ] && [ -n "$AMO_JWT_SECRET" ]; then
            echo "available=true" >> "$GITHUB_OUTPUT"
          else
            echo "available=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Prepare source archive for AMO
        if: ${{ steps.amo-secrets.outputs.available == 'true' }}
        run: |
          mkdir -p web-ext-source
          zip -r web-ext-source/source.zip . \
            -x ".git/*" \
            -x "node_modules/*" \
            -x "dist/*" \
            -x "*.zip" \
            -x "web-ext-source/*"

      - name: Submit to Firefox Add-ons (AMO)
        if: ${{ steps.amo-secrets.outputs.available == 'true' }}
        env:
          AMO_JWT_ISSUER: ${{ secrets.AMO_JWT_ISSUER }}
          AMO_JWT_SECRET: ${{ secrets.AMO_JWT_SECRET }}
        run: |
          npx web-ext sign \
            --source-dir dist/firefox-mv3 \
            --channel=listed \
            --amo-metadata amo-metadata.json \
            --upload-source-code web-ext-source/source.zip \
            --api-key "$AMO_JWT_ISSUER" \
            --api-secret "$AMO_JWT_SECRET"

      - name: Generate release notes
        id: notes
        run: |
          PREV_TAG=$(git tag --sort=-v:refname | head -2 | tail -1 || echo "")
          if [ -n "$PREV_TAG" ]; then
            NOTES=$(git log "$PREV_TAG"..HEAD --oneline --no-decorate 2>/dev/null || echo "")
          else
            NOTES=$(git log --oneline --no-decorate 2>/dev/null || echo "")
          fi
          {
            echo 'notes<<EOF'
            echo "$NOTES"
            echo
            echo '---'
            echo "构建时间: $(date -u '+%Y-%m-%d %H:%M:%S UTC')"
            echo 'EOF'
          } >> "$GITHUB_OUTPUT"

      - name: Create draft release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: ${{ github.ref_name }}
          body: ${{ steps.notes.outputs.notes }}
          draft: true
          prerelease: false
          files: |
            dist/*.zip
